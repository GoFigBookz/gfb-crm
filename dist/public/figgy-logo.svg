<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" role="img" aria-label="Figgy">
  <defs>
    <linearGradient id="bot" x1="20" y1="20" x2="78" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="leaf" x1="30" y1="56" x2="70" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#4d7c0f"/>
    </linearGradient>
    <linearGradient id="fig" x1="44" y1="2" x2="56" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bef264"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
    <linearGradient id="ink" x1="92" y1="20" x2="290" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#84cc16"/>
      <stop offset="0.6" stop-color="#65a30d"/>
      <stop offset="1" stop-color="#3f6212"/>
    </linearGradient>
  </defs>

  <!-- ==== little AI bot ==== -->
  <!-- antenna + fig bauble -->
  <path d="M49 18V9" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M49 9c0-3.2 2-5.6 5-7-0.2 3.6-1.6 6-4 7.4" fill="url(#fig)"/>
  <circle cx="49" cy="8" r="3.2" fill="url(#fig)"/>
  <!-- head -->
  <rect x="30" y="18" width="38" height="26" rx="9" fill="url(#bot)" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="35" y="24" width="28" height="14" rx="6" fill="#1e293b"/>
  <circle cx="44" cy="31" r="3" fill="#a3e635"/><circle cx="54" cy="31" r="3" fill="#a3e635"/>
  <circle cx="45" cy="30" r="1" fill="#fff"/><circle cx="55" cy="30" r="1" fill="#fff"/>
  <!-- ears -->
  <circle cx="28" cy="31" r="2.5" fill="#84cc16"/><circle cx="70" cy="31" r="2.5" fill="#84cc16"/>
  <!-- body -->
  <rect x="32" y="47" width="34" height="30" rx="10" fill="url(#bot)" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- arms -->
  <path d="M32 54c-6 1-9 5-9 11" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M66 54c6 1 9 5 9 11" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <!-- feet -->
  <rect x="36" y="76" width="9" height="6" rx="3" fill="#94a3b8"/>
  <rect x="53" y="76" width="9" height="6" rx="3" fill="#94a3b8"/>
  <!-- the fig leaf (cheeky) covering the bot's lower body -->
  <path d="M49 56c5-2 11-1.5 15 1.5-2.5 6-7.5 10-13 10.5-1 2.5-1 5 0 7.5-1.5 1-3.5 1-5 0 1-2.5 1-5 0-7.5-5.5-.5-10.5-4.5-13-10.5 4-3 10-3.5 15-1.5l1 .5Z" fill="url(#leaf)"/>
  <path d="M49 57v18" stroke="#3f6212" stroke-width="1.2" opacity="0.6"/>
  <path d="M49 64l6-4M49 70l5-3M49 64l-6-4M49 70l-5-3" stroke="#3f6212" stroke-width="1" opacity="0.5"/>

  <!-- ==== cursive wordmark ==== -->
  <text x="92" y="68" font-family="'Brush Script MT','Segoe Script','Snell Roundhand',cursive" font-style="italic" font-size="62" font-weight="700" fill="url(#ink)">Figgy</text>
</svg>
