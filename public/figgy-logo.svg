<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 150" role="img" aria-label="Figgy">
  <defs>
    <linearGradient id="ink" x1="20" y1="20" x2="320" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#84cc16"/><stop offset="0.6" stop-color="#65a30d"/><stop offset="1" stop-color="#3f6212"/>
    </linearGradient>
  </defs>

  <!-- Smooth flowing flourish: a single graceful curve that lifts off the F and
       sweeps over the word (replaces the stiff geometric crossbar). -->
  <path d="M40 52 C70 18, 210 8, 300 30" fill="none" stroke="url(#ink)" stroke-width="7"
        stroke-linecap="round" opacity="0.92"/>

  <!-- The whole word in ONE flowing script so the letters connect and flow
       (the previous stiffness was a geometric path-F + a disjoint fallback).
       Stack favours genuinely flowing scripts; 'iggy' is split out only so the
       Figs mascot can sit as the dot of the i. Same font + size = one wordmark. -->
  <g font-family="'Pacifico','Satisfy','Segoe Script','Snell Roundhand','Apple Chancery','Brush Script MT',cursive"
     font-size="96" fill="url(#ink)">
    <text x="16" y="118">F</text>
    <text x="92" y="118" letter-spacing="-1">iggy</text>
  </g>

  <!-- The dot of the 'i' IS Figs (the mascot tittle), above the i-stem. -->
  <g transform="translate(96 26) scale(0.34)">
    <path d="M50.0 22.0 L54.6 25.7 L60.2 23.6 L63.5 28.5 L69.4 28.3 L71.0 34.0 L76.7 35.6 L76.5 41.5 L81.4 44.8 L79.3 50.4 L83.0 55.0 L79.3 59.6 L81.4 65.2 L76.5 68.5 L76.7 74.4 L71.0 76.0 L69.4 81.7 L63.5 81.5 L60.2 86.4 L54.6 84.3 L50.0 88.0 L45.4 84.3 L39.8 86.4 L36.5 81.5 L30.6 81.7 L29.0 76.0 L23.3 74.4 L23.5 68.5 L18.6 65.2 L20.7 59.6 L17.0 55.0 L20.7 50.4 L18.6 44.8 L23.5 41.5 L23.3 35.6 L29.0 34.0 L30.6 28.3 L36.5 28.5 L39.8 23.6 L45.4 25.7 Z" fill="#a3e635" stroke="#4d7c0f" stroke-width="3.4" stroke-linejoin="round"/>
    <circle cx="30" cy="64" r="5" fill="#65a30d" opacity="0.45"/><circle cx="70" cy="64" r="5" fill="#65a30d" opacity="0.45"/>
    <ellipse cx="37" cy="53" rx="10" ry="12" fill="#fff" stroke="#1e293b" stroke-width="1.8"/>
    <ellipse cx="63" cy="53" rx="10" ry="12" fill="#fff" stroke="#1e293b" stroke-width="1.8"/>
    <circle cx="38.5" cy="55.5" r="5.2" fill="#1e293b"/><circle cx="64.5" cy="55.5" r="5.2" fill="#1e293b"/>
    <circle cx="40.3" cy="53.7" r="1.8" fill="#fff"/><circle cx="66.3" cy="53.7" r="1.8" fill="#fff"/>
    <path d="M42 70 q8 9 16 0" stroke="#1e293b" stroke-width="3.4" fill="none" stroke-linecap="round"/>
    <path d="M50 26 q-2 -12 6 -18" stroke="#4d7c0f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M56 8 q11 -3 16 4 q-5 9 -16 6 q-4 -4 0 -10Z" fill="#84cc16" stroke="#4d7c0f" stroke-width="2.6" stroke-linejoin="round"/>
  </g>
</svg>
